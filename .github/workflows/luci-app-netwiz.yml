name: Build and Release luci-app-netwiz

on:
  workflow_dispatch:
    inputs:
      new_version:
        description: '【修改版本号】例如 1, 1.2, 1.2.3。填入后将更新 Makefile 并保存，不发版；留空则读取当前版本并进行双格式(IPK+APK)发版编译。'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ==========================================
  # 阶段 1：智能版本号处理 (原生逻辑保留)
  # ==========================================
  prepare:
    name: Handle Version Input
    runs-on: ubuntu-22.04
    outputs:
      skip_build: ${{ steps.version_handler.outputs.skip_build }}
      pkg_version: ${{ steps.version_handler.outputs.pkg_version }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Process Input and Update Makefile
        id: version_handler
        run: |
          INPUT_VER="${{ github.event.inputs.new_version }}"
          
          if [ -z "$INPUT_VER" ]; then
            echo "输入为空，准备读取现有版本号并进行双格式编译..."
            VERSION=$(grep 'PKG_VERSION:=' applications/luci-app-netwiz/Makefile | cut -d'=' -f2 | tr -d ' ')
            echo "pkg_version=$VERSION" >> $GITHUB_OUTPUT
            echo "skip_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [[ ! "$INPUT_VER" =~ ^[0-9]+(\.[0-9]+){0,2}$ ]]; then
            echo "::error::格式错误！只允许输入数字，如 1, 1.2 或 1.2.3。"
            exit 1
          fi
          
          IFS='.' read -r -a parts <<< "$INPUT_VER"
          V1=${parts[0]:-0}
          V2=${parts[1]:-0}
          V3=${parts[2]:-0}
          NEW_VERSION="${V1}.${V2}.${V3}"
          
          # 在 Ubuntu 本机更新代码，必须带有物理路径 applications/
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$NEW_VERSION/g" applications/luci-app-netwiz/Makefile
          sed -i "s/var CURRENT_VERSION = '.*';/var CURRENT_VERSION = 'v$NEW_VERSION';/g" applications/luci-app-netwiz/root/www/luci-static/resources/view/netwiz.js || true
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add applications/luci-app-netwiz/Makefile applications/luci-app-netwiz/root/www/luci-static/resources/view/netwiz.js || true
          
          if git diff --cached --quiet; then
            echo "版本号未改变。"
          else
            git commit -m "chore: bump version to $NEW_VERSION"
            git push
          fi
          
          echo "skip_build=true" >> $GITHUB_OUTPUT

  # ==========================================
  # 阶段 2：引擎替换为稳定的 Docker 矩阵编译
  # ==========================================
  build:
    name: Compile IPK & APK
    needs: prepare
    if: needs.prepare.outputs.skip_build != 'true'
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        sdk_version: [ "x86_64-23.05.5", "x86_64-snapshot" ]
        
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 【核心修复】：物理隔离，防止 SDK 错误编译其他底层的 LuCI 核心组件
      # 【核心修复】：物理隔离，防止 SDK 错误编译其他底层的 LuCI 核心组件
      - name: 隔离插件代码与修正路径
        run: |
          mkdir -p /tmp/pure_plugin
          # 1. 把您的核心插件提取到安全区
          cp -r applications/luci-app-netwiz /tmp/pure_plugin/
          
          # 2. 彻底清空当前工作区（清除冲突包，但也会删掉原本相对路径的 luci.mk）
          rm -rf *
          
          # 3. 把纯净插件放回工作区根目录
          cp -r /tmp/pure_plugin/luci-app-netwiz ./
          
          # 4. 【关键魔法】：将 Makefile 里的相对路径，动态替换为 SDK 的系统级绝对路径！
          sed -i 's|../../luci.mk|$(TOPDIR)/feeds/luci/luci.mk|g' luci-app-netwiz/Makefile

      - name: 编译 LuCI 插件 (IPK & APK)
        uses: sbwml/openwrt-gh-action-sdk@main   
        env:
          ARCH: ${{ matrix.sdk_version }}
          # 此时根目录下只有 luci-app-netwiz 这一个包了
          PACKAGES: luci-app-netwiz
          NO_REFRESH_CHECK: true

      - name: 提取并重命名安装包 (固定文件名)
        run: |
          mkdir -p release_pkgs
          find bin/ -name "luci-app-netwiz*.ipk" -exec cp {} release_pkgs/luci-app-netwiz.ipk \; || true
          find bin/ -name "luci-app-netwiz*.apk" -exec cp {} release_pkgs/luci-app-netwiz.apk \; || true

      - name: 上传编译产物到临时云端
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.sdk_version }}
          path: release_pkgs/*
          compression-level: 0

  # ==========================================
  # 阶段 3：合并发版
  # ==========================================
  release:
    name: Publish Release
    needs: [prepare, build]
    if: needs.prepare.outputs.skip_build != 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write 
      
    steps:
      - name: 下载所有架构的编译产物
        uses: actions/download-artifact@v4
        with:
          path: final_release
          merge-multiple: true 

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.pkg_version }}
          name: "LuCI App Netwiz v${{ needs.prepare.outputs.pkg_version }}"
          draft: false
          prerelease: false
          files: |
            final_release/*.*pk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
