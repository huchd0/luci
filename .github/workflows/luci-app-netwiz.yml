name: Build and Release luci-app-netwiz

on:
  workflow_dispatch:
    inputs:
      new_version:
        description: '【修改版本号】例如 1, 1.2, 1.2.3。填入后将更新 Makefile 并保存，不发版；留空则读取当前版本并进行双格式(IPK+APK)发版编译。'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-22.04 
    strategy:
      matrix:
        arch: [x86_64]
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 智能版本号处理
    - name: Handle Version Input
      id: version_handler
      run: |
        INPUT_VER="${{ github.event.inputs.new_version }}"
        if [ -z "$INPUT_VER" ]; then
          echo "输入为空，准备读取现有版本号并进行完整编译..."
          echo "skip_build=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        if [[ ! "$INPUT_VER" =~ ^[0-9]+(\.[0-9]+){0,2}$ ]]; then
          echo "::error::格式错误！只允许输入数字，如 1, 1.2 或 1.2.3。"
          exit 1
        fi
        
        IFS='.' read -r -a parts <<< "$INPUT_VER"
        V1=${parts[0]:-0}
        V2=${parts[1]:-0}
        V3=${parts[2]:-0}
        NEW_VERSION="${V1}.${V2}.${V3}"
        
        sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$NEW_VERSION/g" applications/luci-app-netwiz/Makefile
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add applications/luci-app-netwiz/Makefile
        
        if git diff --cached --quiet; then
          echo "版本号未改变。"
        else
          git commit -m "chore: bump version to $NEW_VERSION"
          git push
        fi
        
        echo "skip_build=true" >> $GITHUB_OUTPUT

    # 仅留空时执行
    - name: Setup Build Environment
      if: steps.version_handler.outputs.skip_build != 'true'
      run: |
        sudo apt-get update
        # 【修复点 1】：去掉了报错的 apk-tools，让 Ubuntu 顺畅安装其它底层必备工具
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev file wget python3-setuptools \
        python3-dev zstd cmake ninja-build pkg-config

    - name: Download and Setup SDK
      if: steps.version_handler.outputs.skip_build != 'true'
      run: |
        wget -qO sdk.tar.zst "https://downloads.immortalwrt.org/releases/24.10.0/targets/x86/64/immortalwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
        tar xf sdk.tar.zst
        mv immortalwrt-sdk-*/ sdk
        
    - name: Prepare Package
      if: steps.version_handler.outputs.skip_build != 'true'
      run: |
        cp -r applications/luci-app-netwiz sdk/package/
        sed -i 's|../../luci.mk|$(TOPDIR)/feeds/luci/luci.mk|g' sdk/package/luci-app-netwiz/Makefile

    # ================= 终极魔法：IPK & APK 强力双编译 =================
    - name: Compile and Collect Packages (IPK & APK)
      if: steps.version_handler.outputs.skip_build != 'true'
      run: |
        mkdir -p release_assets
        cd sdk
        
        # 【修复点 2】：利用爬虫脚本，直接从 Alpine 官方 CDN 扒出最新版的静态 apk 核心
        echo ">>> 安装原生 apk 静态环境 <<<"
        mkdir -p staging_dir/host/bin /tmp/apk-tools
        APK_FILE=$(curl -sL https://dl-cdn.alpinelinux.org/alpine/latest-stable/main/x86_64/ | grep -o 'apk-tools-static-[^"]*\.apk' | head -n 1)
        wget -qO- "https://dl-cdn.alpinelinux.org/alpine/latest-stable/main/x86_64/$APK_FILE" | tar -xz -C /tmp/apk-tools
        # 将静态执行文件移动到 SDK 的御用位置，并赋予执行权限
        mv /tmp/apk-tools/sbin/apk.static staging_dir/host/bin/apk
        chmod +x staging_dir/host/bin/apk
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        make defconfig
        cp .config .config.bak
        
        # --- 1. 编译 IPK ---
        echo ">>> 开始编译 IPK 格式 <<<"
        make package/luci-app-netwiz/compile V=s CONFIG_USE_APK= USE_APK=0
        find bin/packages/ -name "luci-app-netwiz_*.ipk" -exec cp {} ../release_assets/ \;
        
        # --- 2. 彻底大扫除 ---
        echo ">>> 清理缓存，准备生成新格式 <<<"
        make package/luci-app-netwiz/clean
        rm -rf bin/
        
        # --- 3. 编译 APK ---
        echo ">>> 开始编译 APK 格式 <<<"
        cp .config.bak .config
        echo "CONFIG_USE_APK=y" >> .config
        make defconfig 
        
        make package/luci-app-netwiz/compile V=s USE_APK=1 CONFIG_USE_APK=y
        
        find bin/packages/ -name "luci-app-netwiz_*.apk" -exec cp {} ../release_assets/ \;

    # 获取版本号
    - name: Get Version
      if: steps.version_handler.outputs.skip_build != 'true'
      id: get_version
      run: |
        VERSION=$(grep 'PKG_VERSION:=' applications/luci-app-netwiz/Makefile | cut -d'=' -f2 | tr -d ' ')
        echo "pkg_version=$VERSION" >> $GITHUB_OUTPUT

    # 发布到 Releases
    - name: Create Release and Upload Assets
      if: steps.version_handler.outputs.skip_build != 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.pkg_version }}
        name: "LuCI App Netwiz v${{ steps.get_version.outputs.pkg_version }}"
        draft: false
        prerelease: false
        files: |
          release_assets/luci-app-netwiz_*.*pk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
