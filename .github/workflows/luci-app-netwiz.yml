name: Build luci-app-netwiz (APK)

on:
  workflow_dispatch: # 只能在 Actions 页面手动点击 "Run workflow" 运行

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-22.04 
    strategy:
      matrix:
        arch: [x86_64]
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Build Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev file wget python3-setuptools \
        python3-dev zstd cmake ninja-build pkg-config

    - name: Download and Setup ImmortalWrt 24.10 SDK
      run: |
        wget -qO sdk.tar.zst "https://downloads.immortalwrt.org/releases/24.10.0/targets/x86/64/immortalwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
        tar xf sdk.tar.zst
        mv immortalwrt-sdk-*/ sdk
        
    - name: Prepare Package in SDK
      run: |
        # 复制插件目录到 SDK
        cp -r applications/luci-app-netwiz sdk/package/

        sed -i 's|../../luci.mk|$(TOPDIR)/feeds/luci/luci.mk|g' sdk/package/luci-app-netwiz/Makefile
        
    - name: Compile the Plugin
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # apk 格式打包
        echo "CONFIG_USE_APK=y" >> .config
        
        make defconfig
        make package/luci-app-netwiz/compile V=s
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-netwiz-${{ matrix.arch }}-package
        path: sdk/bin/packages/**/luci-app-netwiz_*.*pk
   
    name: Build and Release luci-app-netwiz

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-22.04 
    strategy:
      matrix:
        arch: [x86_64]
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev file wget python3-setuptools \
        python3-dev zstd cmake ninja-build pkg-config

    - name: Download and Setup SDK
      run: |
        wget -qO sdk.tar.zst "https://downloads.immortalwrt.org/releases/24.10.0/targets/x86/64/immortalwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
        tar xf sdk.tar.zst
        mv immortalwrt-sdk-*/ sdk
        
    - name: Prepare Package
      run: |
        mkdir -p sdk/package/luci-app-netwiz
        cp -r Makefile htdocs po root sdk/package/luci-app-netwiz/
        
    - name: Compile the Plugin
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        echo "CONFIG_USE_APK=y" >> .config
        make defconfig
        make package/luci-app-netwiz/compile V=s

    - name: Prepare Release Files
      run: |
        mkdir -p release_assets
        find sdk/bin/packages/ -name "luci-app-netwiz_*.*pk" -exec cp {} release_assets/ \;
        
    # 建立 Release
    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.16 # 這裡可以改成您 Makefile 裡的版本號
        name: "LuCI App Netwiz v1.0.16"
        draft: false
        prerelease: false
        files: |
          release_assets/luci-app-netwiz_*.*pk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
