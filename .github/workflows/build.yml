name: Build luci-app-netwiz

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许手动在 Actions 页面触发编译

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 这里默认使用 x86_64 架构进行编译
        arch: [x86_64]
    
    steps:
    - name: Checkout Source Code
      # 更新到最新的 v4 版本
      uses: actions/checkout@v4

    - name: Setup Build Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Download and Setup ImmortalWrt SDK
      run: |
        # 下载 ImmortalWrt SDK (以 23.05 版本的 x86_64 为例)
        wget -qO sdk.tar.xz "https://downloads.immortalwrt.org/releases/23.05.2/targets/x86/64/immortalwrt-sdk-23.05.2-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
        tar xf sdk.tar.xz
        mv immortalwrt-sdk-*/ sdk
        
    - name: Prepare Package in SDK
      run: |
        # 将您仓库中的插件源码放入 SDK 的 package 目录
        mkdir -p sdk/package/luci-app-netwiz
        cp -r Makefile htdocs po root sdk/package/luci-app-netwiz/
        
    - name: Compile the Plugin
      run: |
        cd sdk
        # 更新和安装 LuCI 基础依赖
        ./scripts/feeds update luci
        ./scripts/feeds install luci-base
        
        # 生成默认编译配置
        make defconfig
        
        # 核心：单独编译您的插件
        make package/luci-app-netwiz/compile V=s
        
    - name: Upload Artifact
      # 更新到最新的 v4 版本
      uses: actions/upload-artifact@v4
      with:
        name: luci-app-netwiz-${{ matrix.arch }}
        # 自动抓取编译好的包
        path: sdk/bin/packages/**/luci-app-netwiz_*.ipk
